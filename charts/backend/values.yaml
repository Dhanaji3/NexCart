replicaCount: 2

image:
  repository: ghcr.io/your-org/backend-springboot
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

env:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/ecommerce_db"
  SPRING_PROFILES_ACTIVE: "prod"
  JWT_EXPIRATION: "86400000"
