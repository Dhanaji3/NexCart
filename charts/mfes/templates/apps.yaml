{{- range .Values.apps }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}
  labels:
    app: {{ .name }}
spec:
  replicas: {{ $.Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .name }}
  template:
    metadata:
      labels:
        app: {{ .name }}
    spec:
      containers:
        - name: {{ .name }}
          image: "{{ $.Values.imageRegistry }}/{{ .image }}:{{ $.Values.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "{{ $.Values.resources.requests.cpu }}"
              memory: "{{ $.Values.resources.requests.memory }}"
            limits:
              cpu: "{{ $.Values.resources.limits.cpu }}"
              memory: "{{ $.Values.resources.limits.memory }}"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app: {{ .name }}
---
{{- end }}
