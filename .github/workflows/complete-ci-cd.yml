name: Complete CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  # ========== FRONTEND ==========
  frontend-lint:
    name: Frontend - Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint
      - run: cd frontend && npm run type-check

  frontend-test:
    name: Frontend - Unit Tests
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - run: cd frontend && npm ci
      - run: cd frontend && npm run test -- --coverage

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  frontend-build:
    name: Frontend - Build MFEs
    runs-on: ubuntu-latest
    needs: frontend-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - run: cd frontend && npm ci
      - run: cd frontend && npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ========== BACKEND ==========
  backend-lint:
    name: Backend - Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - run: cd backend/backend-springboot && chmod +x gradlew && ./gradlew checkstyleMain --no-daemon
        continue-on-error: true

  backend-test:
    name: Backend - Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ecommerce_test
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - run: |
          cd backend/backend-springboot
          chmod +x gradlew
          ./gradlew test \
            -Dspring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce_test \
            -Dspring.datasource.password=postgres \
            --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/backend-springboot/build/test-results/

  backend-build:
    name: Backend - Build JAR
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - run: |
          cd backend/backend-springboot
          chmod +x gradlew
          ./gradlew build -x test --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/backend-springboot/build/libs/

  # ========== DOCKER BUILD ==========
  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-build]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Download artifacts
      - uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/backend-springboot/build/libs/

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      # Build and push backend
      - uses: docker/build-push-action@v5
        with:
          context: ./backend/backend-springboot
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend-springboot:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend-springboot:${{ github.sha }}

      # Build and push frontend images
      - name: Build and push frontend images
        run: |
          for app in host mfe-auth mfe-products mfe-cart mfe-checkout mfe-orders mfe-admin; do
            docker build -f frontend/Dockerfile \
              --build-arg APP_NAME=$app \
              -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend-$app:latest \
              -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend-$app:${{ github.sha }} \
              ./frontend
            docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend-$app:latest
            docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend-$app:${{ github.sha }}
          done

  # ========== DATABASE MIGRATIONS ==========
  db-migration:
    name: Database - Run Migrations
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ecommerce_prod
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - run: |
          cd backend/backend-springboot
          chmod +x gradlew
          ./gradlew flywayMigrate \
            -Dflyway.url=jdbc:postgresql://localhost:5432/ecommerce_prod \
            -Dflyway.user=postgres \
            -Dflyway.password=postgres \
            --no-daemon
        continue-on-error: true

  # ========== SECURITY SCANNING ==========
  security-scan:
    name: Security - SAST Scan
    runs-on: ubuntu-latest
    needs: [frontend-lint, backend-lint]
    steps:
      - uses: actions/checkout@v4

      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"

      - uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: "trivy-results.sarif"

  # ========== KUBERNETES DEPLOYMENT ==========
  k8s-deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy database
        run: kubectl apply -f k8s/00-common.yaml k8s/01-database.yaml --namespace=ecommerce

      - name: Wait for database
        run: |
          kubectl wait --for=condition=ready pod \
            -l app=postgres -n ecommerce --timeout=300s

      - name: Deploy backend
        run: kubectl apply -f k8s/02-backend.yaml --namespace=ecommerce

      - name: Deploy frontend
        run: kubectl apply -f k8s/03-frontend.yaml --namespace=ecommerce

      - name: Verify deployment
        run: |
          kubectl get all -n ecommerce
          kubectl wait --for=condition=available \
            --timeout=300s \
            deployment/backend deployment/frontend \
            -n ecommerce

  # ========== SMOKE TESTS ==========
  smoke-tests:
    name: Smoke Tests - Production
    runs-on: ubuntu-latest
    needs: k8s-deploy
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Wait for services
        run: sleep 30

      - name: Test backend health
        run: |
          BACKEND_URL=$(kubectl get service backend -n ecommerce -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          curl -f http://$BACKEND_URL:8080/api/health

      - name: Test frontend
        run: |
          FRONTEND_URL=$(kubectl get service frontend -n ecommerce -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          curl -f http://$FRONTEND_URL

      - name: Test database
        run: |
          kubectl exec -n ecommerce postgres-0 -- \
            psql -U postgres -d ecommerce_db -c "SELECT 1"

  # ========== NOTIFICATIONS ==========
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-build, docker-build]
    if: always()
    steps:
      - name: Send Slack notification
        if: always() && secrets.SLACK_WEBHOOK != ''
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "CI/CD Pipeline: ${{ job.status }}"
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
