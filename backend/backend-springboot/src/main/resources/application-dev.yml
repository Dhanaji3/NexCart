# Development Profile Configuration
# Run with: mvn spring-boot:run -Dspring-boot.run.arguments="--spring.profiles.active=dev"
# Or set environment variable: SPRING_PROFILES_ACTIVE=dev

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: create-drop  # Create tables on startup, drop on shutdown (dev only!)
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true  # Show SQL queries in console
  
  # Load sample data on startup (create data.sql in resources)
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

server:
  port: 8080

jwt:
  secret: dev-secret-key-change-this-for-production
  expiration: 86400000  # 24 hours

logging:
  level:
    root: INFO
    com.ecommerce: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
