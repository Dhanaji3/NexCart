version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ecommerce_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ecommerce-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@ecommerce.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped

  # Spring Boot Backend API
  backend:
    build:
      context: ./backend/backend-springboot
      dockerfile: Dockerfile
    container_name: ecommerce-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST:-postgres}:${DB_PORT:-5432}/${DB_NAME:-ecommerce_db}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${HIBERNATE_DDL:-update}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-min-32-chars-required-for-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      JAVA_OPTS: -Xmx512m -Xms256m
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Frontend - Host Shell
  host:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        APP_NAME: host
    container_name: ecommerce-host
    ports:
      - "${FRONTEND_HOST_PORT:-80}:80"
    depends_on:
      - mfe-auth
      - mfe-products
      - mfe-cart
      - mfe-checkout
      - mfe-orders
      - mfe-admin
    networks:
      - ecommerce-network
    restart: unless-stopped

  # Micro-Frontend: Auth
  mfe-auth:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        APP_NAME: mfe-auth
    container_name: ecommerce-mfe-auth
    expose:
      - "80"
    networks:
      - ecommerce-network
    restart: unless-stopped

  # Micro-Frontend: Products
  mfe-products:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        APP_NAME: mfe-products
    container_name: ecommerce-mfe-products
    expose:
      - "80"
    networks:
      - ecommerce-network
    restart: unless-stopped

  # Micro-Frontend: Cart
  mfe-cart:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        APP_NAME: mfe-cart
    container_name: ecommerce-mfe-cart
    expose:
      - "80"
    networks:
      - ecommerce-network
    restart: unless-stopped

  # Micro-Frontend: Checkout
  mfe-checkout:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        APP_NAME: mfe-checkout
    container_name: ecommerce-mfe-checkout
    expose:
      - "80"
    networks:
      - ecommerce-network
    restart: unless-stopped

  # Micro-Frontend: Orders
  mfe-orders:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        APP_NAME: mfe-orders
    container_name: ecommerce-mfe-orders
    expose:
      - "80"
    networks:
      - ecommerce-network
    restart: unless-stopped

  # Micro-Frontend: Admin
  mfe-admin:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        APP_NAME: mfe-admin
    container_name: ecommerce-mfe-admin
    expose:
      - "80"
    networks:
      - ecommerce-network
    restart: unless-stopped

# Volumes for data persistence
volumes:
  postgres_data:
    driver: local

# Network for service communication
networks:
  ecommerce-network:
    driver: bridge

# Usage:
# docker-compose up -d                          # Start all services
# docker-compose down                           # Stop all services
# docker-compose logs backend                   # View backend logs
# docker-compose ps                             # Show status
# docker-compose exec postgres psql -U postgres -d ecommerce_db  # Connect to DB
# docker-compose build --no-cache              # Rebuild images
