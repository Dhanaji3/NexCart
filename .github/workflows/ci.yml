name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint
      - run: cd frontend && npm run type-check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - run: cd frontend && npm ci
      - run: cd frontend && npm run test -- --coverage

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  build:
    name: Build All MFEs
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        workspace:
          [
            shared,
            host,
            mfe-auth,
            mfe-products,
            mfe-cart,
            mfe-checkout,
            mfe-orders,
            mfe-admin,
          ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - run: cd frontend && npm ci
      - run: cd frontend && npm run build --workspace=${{ matrix.workspace }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.workspace }}
          path: ${{ matrix.workspace }}/dist/

  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        run: |
          for app in host mfe-auth mfe-products mfe-cart mfe-checkout mfe-orders mfe-admin; do
            docker build --build-arg APP_NAME=$app -t ghcr.io/${{ toLower(github.repository) }}/$app:latest .
            docker push ghcr.io/${{ toLower(github.repository) }}/$app:latest
          done
