worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Host app
    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html/host;
        index index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # MFE proxies
        location /mfe-auth/ {
            proxy_pass http://mfe-auth:80/;
        }

        location /mfe-products/ {
            proxy_pass http://mfe-products:80/;
        }

        location /mfe-cart/ {
            proxy_pass http://mfe-cart:80/;
        }

        location /mfe-checkout/ {
            proxy_pass http://mfe-checkout:80/;
        }

        location /mfe-orders/ {
            proxy_pass http://mfe-orders:80/;
        }

        location /mfe-admin/ {
            proxy_pass http://mfe-admin:80/;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
